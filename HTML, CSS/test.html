<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <form>
    <h2>number test</h2>
    <label>숫자 입력</label>
    <input type="number" >
    <br>
    <br>
    <h2>checkbox test</h2>
    <label>체크박스 value 테스트</label>
    <input type="checkbox" value="과연">
    <br>
    <br>
    <h2>radio test</h2>
    <label>1번</label>
    <input name="radio" type="radio" value="1">
    <label>2번</label>
    <input name="radio" type="radio" value="2">
    <label>3번</label>
    <input name="radio" type="radio" value="3">
    <label>4번</label>
    <input name="radio" type="radio" value="4">
    <br>
    <br>
    <label>What's for lunch?</label>
    <select>
      <option value="pizza">Pizza</option>
      <option value="curry">Curry</option>
      <option value="salad">Salad</option>
      <option value="ramen">Ramen</option>
      <option value="tacos">Tacos</option>
    </select>
    <br>
    <br>
    <label>Ideal city to visit?</label>
    <input type="text" list="cities" placeholder="직접입력 또는 선택하세요">
    <datalist id="cities">
      <option value="New York City"></option>
      <option value="Tokyo"></option>
      <option value="Barcelona"></option>
      <option value="Mexico City"></option>
      <option value="Melbourne"></option>
      <option value="Other"></option>  
    </datalist>
  </form>
</body>
</html>
